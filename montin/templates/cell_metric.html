<div class="cell cell-metric{% if cell.params.transparent %} cell-transparent{% endif %}
  cell-halign-{{ cell.params.halign }} cell-valign-{{ cell.params.valign }}"
  style="
    grid-column: {{ cell.params.col }} / span {{ cell.params.colspan }};
    grid-row:    {{ cell.params.row }} / span {{ cell.params.rowspan }};
    {% if cell.params.fontscale != 1.0 %}--cell-font-scale: {{ cell.params.fontscale }};{% endif %}
  "
>
  {% if cell.params.expand_button %}
  <div class="cell-actions">
    <button class="btn-action" onclick="expandCell(this)" title="Expandir">&#x26F6;</button>
  </div>
  {% endif %}

  <div class="cell-body metric-body">
    <div class="metric-value">{{ cell.value }}</div>
    <div class="metric-label">{{ cell.label }}</div>
    {% if cell.delta is not none %}
    <div class="metric-delta {{ cell.delta_class }}"{% if cell.delta_color %} style="color: {{ cell.delta_color }}"{% endif %}>
      {{ cell.delta_symbol }} {{ cell.delta }}{% if cell.delta_label %} {{ cell.delta_label }}{% endif %}
    </div>
    {% endif %}
  </div>

  {% if cell.params.caption %}
  <p class="cell-caption">{{ cell.params.caption }}</p>
  {% endif %}
</div>
