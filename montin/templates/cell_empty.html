<div class="cell cell-empty{% if cell.params.transparent %} cell-transparent{% endif %}
  cell-halign-{{ cell.params.halign }} cell-valign-{{ cell.params.valign }}"
  style="
    grid-column: {{ cell.params.col }} / span {{ cell.params.colspan }};
    grid-row:    {{ cell.params.row }} / span {{ cell.params.rowspan }};
    {% if cell.params.fontscale != 1.0 %}--cell-font-scale: {{ cell.params.fontscale }};{% endif %}
  "
></div>
