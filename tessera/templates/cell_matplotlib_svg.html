<div class="cell cell-image{% if not cell.params.overflow %} cell-clip{% endif %}{% if cell.params.transparent %} cell-transparent{% endif %}
  cell-halign-{{ cell.params.halign }} cell-valign-{{ cell.params.valign }}"
  style="
    grid-column: {{ cell.params.col }} / span {{ cell.params.colspan }};
    grid-row:    {{ cell.params.row }} / span {{ cell.params.rowspan }};
  "
>
  {% if cell.params.expand_button %}
  <div class="cell-actions">
    <button class="btn-action" onclick="expandCell(this)" title="Expand">&#x26F6;</button>
  </div>
  {% endif %}

  <div class="cell-body image-body matplotlib-svg">
    {{ cell.src }}
  </div>

  {% if cell.params.caption %}
  <p class="cell-caption">{{ cell.params.caption }}</p>
  {% endif %}
</div>
